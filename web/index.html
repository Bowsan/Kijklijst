<!doctype html>
<html lang="nl" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f4f5f7" />
    <script>
      // Pas het opgeslagen thema direct toe (standaard licht), vóór de eerste paint.
      try {
        var v = localStorage.getItem('opdebank.theme');
        var t = v === 'dark' ? 'dark'
          : v === 'system' && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark'
          : 'light';
        document.documentElement.dataset.theme = t;
        document.querySelector('meta[name="theme-color"]').setAttribute('content', t === 'dark' ? '#0f1115' : '#f4f5f7');
      } catch (e) {}
    </script>
    <meta name="description" content="Op de Bank — een gedeelde kijklijst voor series, samen met je vrienden." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Op de Bank</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
